<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Popup</title>

    <link
      href="https://fonts.cdnfonts.com/css/do-futuristic"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="popup.css" />
    <link rel="stylesheet" href="node_modules/bulma/css/bulma.css" />
    <!-- https://bulma.io/documentation/elements/button -->
  </head>
  <body>
    <div class="container" style="margin-top: 30px">
      <div class="buttons is-centered">
        <button
          class="button is-primary is-outlined"
          id="buttonCreateWF"
          disabled
        >
          Create WF
        </button>
      </div>
    </div>

    <div class="container" style="margin-top: 30px">
      <div class="buttons is-centered has-addons">
        <button class="button is-success" id="buttonToLive" disabled>
          To Live
        </button>
        <button class="button is-link" id="buttonToPerf" disabled>
          To Perf
        </button>
        <button class="button is-warning" id="buttonToProd" disabled>
          To Prod
        </button>
        <button class="button is-info" id="buttonToTouch" disabled>
          To Touch
        </button>
        <button class="button is-danger" id="buttonToClassic" disabled>
          To Classic
        </button>
      </div>
    </div>

    <div class="container" style="margin-top: 30px">
      <div class="buttons is-centered has-addons">
        <button
          class="button is-light"
          id="buttonOpenPropertiesTouchUI"
          disabled
        >
          Open Properties Touch UI
        </button>
        <button class="button is-success" id="buttonOpenInTree" disabled>
          Open In Tree
        </button>
        <button class="button is-success" id="buttonCheckMothersite" disabled>
          Check mothersite links
        </button>
        <button class="button is-primary" id="buttonShowAltTexts" disabled>
          Alt Texts
        </button>
        <button class="button is-link" id="buttonHighlightHeading" disabled>
          Highlight Heading
        </button>
        <button class="button is-info" id="buttonCopyAllLinks" disabled>
          Copy all links
        </button>
      </div>
    </div>

    <article class="message is-success" style="margin-top: 30px">
      <div id="statusBar"></div>
    </article>

    <article class="message is-success" style="margin-top: 30px">
      <div id="test"></div>
    </article>

    <div class="container" style="margin-top: 30px; padding-left: 10px">
      <div class="buttons">
        <a
          class="button is-danger is-small"
          id="buttonOptions"
          href="options.html"
          target="_blank"
        >
          Options
        </a>
        <a
          class="button is-danger is-small"
          id="buttonGuide"
          href="https://github.com/KovalchukDanil0/AEMFixes#features"
          target="_blank"
        >
          See Guide
        </a>
      </div>
    </div>

    <script src="./node_modules/webextension-polyfill/dist/browser-polyfill.js"></script>
    <script src="sharedTools.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
