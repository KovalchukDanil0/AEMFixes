<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Ford All You Need Options</title>

    <link rel="stylesheet" href="options.css" />
    <link rel="stylesheet" href="cyberpunk.css" />
    <link rel="stylesheet" href="node_modules/bulma/css/bulma.css" />
  </head>
  <body>
    <div class="main-div">
      <div class="field">
        <div class="control">
          <label class="checkbox has-text-white">
            <input id="disCreateWF" type="checkbox" />
            Disable Create Workflow button
          </label>
        </div>
      </div>

      <div class="field">
        <div class="control">
          <label class="checkbox has-text-white">
            <input id="enableFunErr" type="checkbox" />
            Enable funny Error Replacement
          </label>
        </div>
      </div>

      <div class="field is-grouped">
        <div class="control">
          <button id="saveBut" class="button is-link">Save</button>
        </div>
      </div>

      <article class="message is-success">
        <div id="status"></div>
      </article>
    </div>

    <script src="./node_modules/webextension-polyfill/dist/browser-polyfill.js"></script>
    <script src="sharedTools.js"></script>
    <script src="options.js"></script>
  </body>
</html>
